apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meridian-web
  labels:
    app: meridian-web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: meridian.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meridian-web
                port:
                  name: http
  tls:
    - hosts:
        - meridian.example.com
      secretName: meridian-web-tls
